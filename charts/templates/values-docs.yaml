# -- Map of SealedSecret resources.
# Each key becomes the SealedSecret name.
# See [Sealed Secrets examples](#sealed-secrets) for usage.
# @default -- {}
# @section -- Sealed Secrets
sealedSecrets:

  '\<example-secret>':

    metadata:
      # -- Optional. Override the rendered SealedSecret name.
      # @default -- ""
      # @section -- Sealed Secrets
      name: <override-name>

      # -- Optional. Override the rendered SealedSecret namespace.
      # @default -- ""
      # @section -- Sealed Secrets
      namespace: <override-namespace>

    encryptedData:
      # -- Required. Encrypted secret data.
      # @default -- {}
      # @section -- Sealed Secrets
      '\<secret-key>': <sealed-value>

    template:
      # -- Optional. Kubernetes Secret type.
      # @default -- "Opaque"
      # @section -- Sealed Secrets
      type: Opaque

      metadata:
        # -- Optional. Additional labels for the Secret template.
        # common.labels are always included.
        # @default -- {}
        # @section -- Sealed Secrets
        labels:
          <label-key>: <label-value>

        # -- Optional. Annotations for the Secret template metadata.
        # @default -- {}
        # @section -- Sealed Secrets
        annotations:
          <annotation-key>: <annotation-value>

      data:
        # -- Optional. Additional data fields for the Secret template.
        # @default -- {}
        # @section -- Sealed Secrets
        '\<data-key>': <data-value>

# -- Map of Kubernetes NetworkPolicy resources to render.
# Each top-level key becomes the NetworkPolicy name.
# @default -- {}
networkPolicies: {}

# -- Map of CiliumNetworkPolicy resources to render (Cilium CRDs).
# See [Cilium Network Policies examples](#cilium-network-policies) for usage.
# @default -- {}
# @section -- Cilium Network Policies
ciliumNetworkPolicies:
  '\<example-cnp>':
    metadata:
      # -- Optional. Override the rendered CiliumNetworkPolicy name.
      # @default -- ""
      # @section -- Cilium Network Policies
      name: <override-name>

      # -- Optional. Override the rendered CiliumNetworkPolicy namespace.
      # @default -- ""
      # @section -- Cilium Network Policies
      namespace: <override-namespace>
    # -- Optional. Description of the Cilium Network Policy.
    # @default -- ""
    # @section -- Cilium Network Policies
    description: <description-of-policy>

    # -- Required. Endpoint selector for the policy.
    # Use {} to select all endpoints.
    # @default -- {}
    # @section -- Cilium Network Policies
    endpointSelector:
      matchLabels:
        '\<label-key>': <label-value>

      matchExpressions:
        - key: <label-key>
          operator: In
          values:
            - <value1>
            - <value2>

    # -- Optional. Ingress rules for the policy.
    # @default -- []
    # @section -- Cilium Network Policies
    ingress:
      - fromEndpoints:
          - matchLabels:
              '\<label-key>': <label-value>
        toPorts:
          - ports:
              - port: "80"
                protocol: TCP

    # -- Optional. Egress rules for the policy.
    # @default -- []
    # @section -- Cilium Network Policies
    egress:
      - toEndpoints:
          - matchLabels:
              '\<label-key>': <label-value>
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP

# -- Map of Kubernetes resources to render as-is.
# Each key becomes the default metadata.name if not provided.
# @default -- {}
# @section -- Resources
resources:
  example:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      # -- Optional. Override the rendered resource name.
      # @default -- ""
      # @section -- Resources
      name: <override-name>

      # -- Optional. Override the rendered resource namespace.
      # @default -- ""
      # @section -- Resources
      namespace: <override-namespace>
    data:
      value: hello
