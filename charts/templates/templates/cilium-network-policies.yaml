{{- $policies := .Values.ciliumNetworkPolicies | default dict }}
{{- range $name, $value := $policies }}
{{- if and $value (ne $value.enabled false) }}

{{- if not (hasKey $value "endpointSelector") }}
  {{- fail (printf "ciliumNetworkPolicies.%s.endpointSelector is required (use {} for all endpoints)" $name) }}
{{- end }}

{{- include "cnp.applyDefaultPorts" $value }}
{{- $ingressRules := $value.ingress | default (list) }}
{{- $egressRules := $value.egress | default (list) }}
{{- $metadata := (include "common.metadata" (dict "root" $ "metadata" (default dict $value.metadata) "name" $name) | fromYaml) }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $metadata.name | quote }}
  namespace: {{ $metadata.namespace | quote }}
  labels:
    {{- toYaml $metadata.labels | nindent 4 }}
  {{- with $metadata.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $value.description }}
  description: {{ . | quote }}
  {{- end }}
  {{- if $egressRules }}
  egress:
    {{- toYaml $egressRules | nindent 4 }}
  {{- end }}
  {{- if $value.egressDeny }}
  egressDeny:
    {{- toYaml $value.egressDeny | nindent 4 }}
  {{- end }}
  {{- if $value.enableDefaultDeny }}
  enableDefaultDeny:
    {{- toYaml $value.enableDefaultDeny | nindent 4 }}
  {{- end }}
  endpointSelector:
    {{- toYaml $value.endpointSelector | nindent 4 }}
  {{- if $ingressRules }}
  ingress:
    {{- toYaml $ingressRules | nindent 4 }}
  {{- end }}
  {{- if $value.ingressDeny }}
  ingressDeny:
    {{- toYaml $value.ingressDeny | nindent 4 }}
  {{- end }}
  {{- if $value.labels }}
  labels:
    {{- toYaml $value.labels | nindent 4 }}
  {{- end }}
  {{- if $value.log }}
  log:
    {{- toYaml $value.log | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
