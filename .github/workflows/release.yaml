name: RELEASE

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        name: "Setup Helm"
        with:
          version: "v3.17.0"

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set chart version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version: .*/version: ${VERSION}/g" charts/templates/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/g" charts/templates/Chart.yaml

      - name: Build Chart
        run: |
          helm package charts/templates

      - name: Configure Git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "development@kvalitetsit.dk"

      - name: Checkout Helm repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: KvalitetsIT/helm-repo
          token: ${{ secrets.KIT_GITHUB_ACCESS }}
          path: helm-repo

      - name: Publish chart
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p helm-repo/templates
          cp templates-*.tgz helm-repo/templates/
          cd helm-repo
          helm repo index . --url https://raw.githubusercontent.com/KvalitetsIT/helm-repo/master/
          git add -A
          git commit -m "Release templates chart version $TAG"
          git push

  github-release:
    needs:
      - helm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
